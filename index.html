<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ovo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 后面的樱花 Canvas（在卡片下方） -->
    <canvas id="sakuraCanvasBack"></canvas>

    <!-- 主卡片 + 三个小卡片的容器 -->
    <div class="cards-container">
      <!-- 主毛玻璃卡片 -->
      <div class="glass-card main-card">
        <div class="avatar">
          <img src="c2.jpg" alt="avatar" />
        </div>
        <div class="text-content">
          <h2>M1sa</h2>
          <p>欢迎来到我的博客</p>
        </div>
      </div>

      <!-- 三个方形小毛玻璃卡片 -->
      <div class="sub-cards">
        <a
          href="https://github.com/m1s21"
          class="glass-card sub-card"
          target="_blank"
          rel="noopener"
        >
          <img src="github.jpg" alt="card1" />
        </a>
        <a
          href="https://leetcode.cn/u/yuan-628/"
          class="glass-card sub-card"
          target="_blank"
          rel="noopener"
        >
          <img src="leetcode.jpg" alt="card2" />
        </a>
        <a
          href="https://blog.csdn.net/2601_95485599?type=blog"
          class="glass-card sub-card"
          target="_blank"
          rel="noopener"
        >
          <img src="csdn.jpg" alt="card3" />
        </a>
      </div>
    </div>

    <!-- 前面的樱花 Canvas（在卡片上方） -->
    <canvas id="sakuraCanvasFront"></canvas>

    <!-- 引入樱花脚本 -->
    <script src="sakura.js"></script>
  </body>
</html>
